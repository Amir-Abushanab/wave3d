packages:
  - "apps/*"
  - "packages/*"

# pnpm reads package settings from here (not the package.json "pnpm" field).
# Allow esbuild (a Vite dependency) to run its install script so its native
# binary is set up; pnpm blocks dependency build scripts by default.
allowBuilds:
  esbuild: true

# tweakpane 4 ships types that re-export @tweakpane/core but doesn't declare it as a
# dependency (it was resolved via hoisting in the old single-package layout). Declare it as a
# peer so pnpm nests @tweakpane/core under tweakpane in the workspace, keeping the Pane types
# (addFolder/refresh/binding events) resolvable. The studio provides it as a devDependency.
packageExtensions:
  tweakpane:
    peerDependencies:
      "@tweakpane/core": "*"
