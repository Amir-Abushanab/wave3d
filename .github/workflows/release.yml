name: Release

# Changesets-driven publishing. On every push to main:
#   • pending changesets → opens/updates a "Version Packages" PR (bumps versions + changelogs)
#   • that PR merged      → publishes the bumped @wave3d/* packages to npm, tags, GitHub Release
#
# Auth is OIDC / Trusted Publishing — no stored token. One-time prerequisites (see DEPLOY.md):
#   1. Publish 0.1.0 once from your laptop (`npm login` → `pnpm release`); npm can't do a
#      package's FIRST publish over OIDC.
#   2. On each package's npm settings add a Trusted Publisher: repo Amir-Abushanab/wave3d,
#      workflow release.yml. After that, CI publishes tokenlessly.
# The preflight job skips publishing until the packages exist on npm, so runs before step 1 stay green.

on:
  push:
    branches: [main]
    # Only when something publishable changes. A studio-only / docs / CI push has nothing to
    # publish, so skip the whole workflow rather than attempt a (crash-prone) no-op re-publish.
    paths:
      - "packages/**"
      - ".changeset/**"
  workflow_dispatch: {}

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # version PR, tags, GitHub releases
  pull-requests: write # the Version Packages PR
  id-token: write # OIDC trusted publishing + provenance

jobs:
  preflight:
    name: Publish gate
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.gate.outputs.publish }}
    steps:
      - id: gate
        run: |
          if npm view @wave3d/core version >/dev/null 2>&1; then
            echo "publish=pnpm release" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::@wave3d/* not on npm yet — managing Version PRs only. Publish 0.1.0 from your laptop, then enable Trusted Publishing (see DEPLOY.md)."
          fi

  release:
    name: Version or publish
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Trusted publishing needs npm >= 11.5.1; Node 24 may ship an older npm.
      - run: npm install -g npm@latest
      - name: Version Packages PR / publish
        uses: changesets/action@v1
        with:
          # `pnpm run version` = changeset version + sync the skill's library_version, so the skill
          # bump rides this same PR instead of drifting behind the packages.
          version: pnpm run version
          # Empty until the packages exist on npm (see preflight) → PR-only, no publish attempt.
          publish: ${{ needs.preflight.outputs.publish }}
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
          # Fallback if OIDC publishing misbehaves (pnpm's OIDC support is still maturing):
          # add a granular NPM_TOKEN secret and uncomment the next line.
          # NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
