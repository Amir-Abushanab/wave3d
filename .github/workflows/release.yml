name: Release

# Publishes the @wave3d/* packages to npm when you push a version tag (e.g. v0.1.0),
# or via a manual run from the Actions tab. One-time setup (create the @wave3d org +
# add the NPM_TOKEN secret) is documented in DEPLOY.md.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter "@wave3d/*" build
      - name: Publish
        # pnpm publishes in dependency order (core before react/element) and rewrites the
        # workspace:^ ranges to real versions automatically.
        run: pnpm -r --filter "@wave3d/*" publish --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
