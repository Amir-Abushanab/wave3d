name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build

  # Gate the deploy on the Cloudflare secrets existing, so the very first push — before
  # you've added them (see docs/DEPLOY.md) — still shows a green CI instead of a red
  # "missing token" failure.
  preflight:
    name: Deploy preflight
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.gate.outputs.deploy }}
    steps:
      - id: gate
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_API_TOKEN" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping the studio deploy. See DEPLOY.md."
          fi

  deploy-studio:
    name: Deploy studio + gallery → Cloudflare Pages
    needs: preflight
    if: needs.preflight.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build both apps into one tree: studio at the root, gallery under /gallery/ (see build:site).
      - run: pnpm build:site
      # cloudflare/wrangler-action auto-installs wrangler via `pnpm add`, which pnpm refuses at a
      # workspace root (ERR_PNPM_ADDING_TO_ROOT). Invoke wrangler directly instead — `pnpm dlx` runs
      # it from a temp store without touching the workspace, and wrangler reads the CLOUDFLARE_* env.
      - name: Deploy to Cloudflare Pages
        run: |
          # wrangler doesn't auto-create the Pages project — create it once (no-op once it exists).
          pnpm dlx wrangler pages project create wave-studio --production-branch=main || true
          # apps/studio/dist now contains the gallery at /gallery/ (combine-site.mjs).
          pnpm dlx wrangler pages deploy apps/studio/dist --project-name=wave-studio --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
